<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KazeMic - Perekam Suara Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Styling khusus untuk audio player agar sesuai dengan tema gelap */
        audio {
            width: 100%;
        }
        audio::-webkit-media-controls-panel {
            background-color: #1e293b; /* slate-800 */
        }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: #e2e8f0; /* slate-200 */
        }
    </style>
</head>
<body class="min-h-screen bg-slate-950 flex items-center justify-center p-4 font-sans text-slate-100">

    <div class="w-full max-w-md bg-slate-900 rounded-3xl shadow-2xl overflow-hidden border border-slate-800">
        
        <!-- Header -->
        <div class="p-6 bg-slate-800/50 flex items-center justify-between border-b border-slate-800">
            <div class="flex items-center space-x-2">
                <!-- Wind Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-cyan-400">
                    <path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"></path>
                    <path d="M9.6 4.6A2 2 0 1 1 11 8H2"></path>
                    <path d="M12.6 19.4A2 2 0 1 0 14 16H2"></path>
                </svg>
                <h1 class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                    KazeMic
                </h1>
            </div>
            <!-- Recording Indicator (Hidden by default) -->
            <div id="recording-indicator" class="hidden items-center space-x-2">
                <div class="w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse"></div>
                <span class="text-sm font-medium text-slate-300">Merekam</span>
            </div>
        </div>

        <div class="p-6 space-y-6">
            <!-- Error Message (Hidden by default) -->
            <div id="error-message" class="hidden bg-red-500/10 border border-red-500/50 text-red-400 p-3 rounded-xl flex items-start space-x-2 text-sm">
                <!-- AlertCircle Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0 mt-0.5">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" x2="12" y1="8" y2="12"></line>
                    <line x1="12" x2="12.01" y1="16" y2="16"></line>
                </svg>
                <span id="error-text">Terjadi kesalahan.</span>
            </div>

            <!-- Visualizer Canvas -->
            <div class="relative w-full h-32 bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 shadow-inner">
                <canvas id="visualizer" width="400" height="128" class="w-full h-full"></canvas>
                <!-- Timer Overlay -->
                <div id="timer-display" class="absolute top-2 right-3 text-xs font-mono font-medium text-slate-400">
                    00:00
                </div>
            </div>

            <!-- Controls -->
            <div class="flex flex-col items-center space-y-4">
                
                <!-- Main Action Container (Record or Playback) -->
                <div id="main-controls" class="w-full flex flex-col items-center space-y-4">
                    
                    <!-- Record/Stop Button -->
                    <button id="record-btn" class="w-20 h-20 rounded-full flex items-center justify-center transition-all duration-300 shadow-lg bg-cyan-500 hover:bg-cyan-400 hover:scale-105 shadow-cyan-500/20">
                        <!-- Mic Icon -->
                        <svg id="icon-mic" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-900 block">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" x2="12" y1="19" y2="22"></line>
                        </svg>
                        <!-- Square Icon (Hidden by default) -->
                        <svg id="icon-square" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white hidden">
                            <rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect>
                        </svg>
                    </button>

                    <!-- Playback Section (Hidden by default) -->
                    <div id="playback-section" class="w-full space-y-4 hidden">
                        <audio id="audio-player" controls></audio>
                        
                        <div class="flex space-x-3">
                            <button id="reset-btn" class="flex-1 flex items-center justify-center space-x-2 py-3 bg-slate-800 hover:bg-slate-700 rounded-xl text-sm font-medium transition-colors">
                                <!-- RefreshCw Icon -->
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                                    <path d="M3 3v5h5"></path>
                                </svg>
                                <span>Rekam Ulang</span>
                            </button>
                            <a id="download-btn" href="#" download="KazeMic_Recording.webm" class="flex-1 flex items-center justify-center space-x-2 py-3 bg-cyan-600 hover:bg-cyan-500 text-white rounded-xl text-sm font-medium transition-colors">
                                <!-- Download Icon -->
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" x2="12" y1="15" y2="3"></line>
                                </svg>
                                <span>Unduh</span>
                            </a>
                        </div>
                    </div>
                </div>

                <p id="helper-text" class="text-slate-400 text-sm font-medium">Ketuk untuk mulai merekam</p>
            </div>
        </div>
    </div>

    <script>
        // State variables
        let isRecording = false;
        let recordingTime = 0;
        let audioUrl = null;
        
        let mediaRecorder = null;
        let audioChunks = [];
        let audioContext = null;
        let analyser = null;
        let animationFrame = null;
        let stream = null;
        let timerInterval = null;

        // DOM Elements
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        const recordBtn = document.getElementById('record-btn');
        const iconMic = document.getElementById('icon-mic');
        const iconSquare = document.getElementById('icon-square');
        const playbackSection = document.getElementById('playback-section');
        const audioPlayer = document.getElementById('audio-player');
        const resetBtn = document.getElementById('reset-btn');
        const downloadBtn = document.getElementById('download-btn');
        const timerDisplay = document.getElementById('timer-display');
        const recordingIndicator = document.getElementById('recording-indicator');
        const helperText = document.getElementById('helper-text');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');

        // Initialize flatline on load
        drawFlatline();

        // Event Listeners
        recordBtn.addEventListener('click', () => {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        resetBtn.addEventListener('click', resetRecording);

        // Functions
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorMessage.classList.remove('hidden');
        }

        function hideError() {
            errorMessage.classList.add('hidden');
        }

        function stopMediaTracks() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }

        async function startRecording() {
            hideError();
            audioChunks = [];

            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Setup Audio Context
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioContext = new AudioContext();
                analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 2048;

                // Setup MediaRecorder
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioUrl = URL.createObjectURL(audioBlob);
                    
                    // Update UI for playback
                    audioPlayer.src = audioUrl;
                    downloadBtn.href = audioUrl;
                    downloadBtn.download = `KazeMic_${new Date().getTime()}.webm`;
                    
                    recordBtn.classList.add('hidden');
                    playbackSection.classList.remove('hidden');
                    helperText.classList.add('hidden');

                    stopMediaTracks();
                    cancelAnimationFrame(animationFrame);
                    drawFlatline();
                };

                mediaRecorder.start();
                isRecording = true;

                // Update UI for recording state
                recordBtn.classList.remove('bg-cyan-500', 'hover:bg-cyan-400', 'shadow-cyan-500/20');
                recordBtn.classList.add('bg-red-500', 'hover:bg-red-600', 'shadow-red-500/20');
                iconMic.classList.add('hidden');
                iconSquare.classList.remove('hidden');
                recordingIndicator.classList.remove('hidden');
                recordingIndicator.classList.add('flex');
                helperText.textContent = 'Ketuk untuk berhenti';

                // Start Timer
                recordingTime = 0;
                timerDisplay.textContent = formatTime(recordingTime);
                timerInterval = setInterval(() => {
                    recordingTime++;
                    timerDisplay.textContent = formatTime(recordingTime);
                }, 1000);

                // Start Visualizer
                drawVisualizer();

            } catch (err) {
                console.error("Gagal mengakses mikrofon:", err);
                showError("Gagal mengakses mikrofon. Pastikan Anda telah memberikan izin.");
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                
                clearInterval(timerInterval);
                
                // Update UI to stop state
                recordBtn.classList.add('bg-cyan-500', 'hover:bg-cyan-400', 'shadow-cyan-500/20');
                recordBtn.classList.remove('bg-red-500', 'hover:bg-red-600', 'shadow-red-500/20');
                iconMic.classList.remove('hidden');
                iconSquare.classList.add('hidden');
                recordingIndicator.classList.add('hidden');
                recordingIndicator.classList.remove('flex');
            }
        }

        function resetRecording() {
            audioUrl = null;
            recordingTime = 0;
            timerDisplay.textContent = formatTime(recordingTime);
            hideError();
            drawFlatline();
            
            // Reset UI to initial state
            playbackSection.classList.add('hidden');
            recordBtn.classList.remove('hidden');
            helperText.classList.remove('hidden');
            helperText.textContent = 'Ketuk untuk mulai merekam';
        }

        function drawVisualizer() {
            if (!analyser) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                animationFrame = requestAnimationFrame(draw);

                analyser.getByteTimeDomainData(dataArray);

                canvasCtx.fillStyle = '#0f172a'; // slate-900
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                canvasCtx.lineWidth = 2;
                canvasCtx.strokeStyle = '#06b6d4'; // cyan-500
                canvasCtx.beginPath();

                const sliceWidth = canvas.width * 1.0 / bufferLength;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const v = dataArray[i] / 128.0;
                    const y = v * canvas.height / 2;

                    if (i === 0) {
                        canvasCtx.moveTo(x, y);
                    } else {
                        canvasCtx.lineTo(x, y);
                    }

                    x += sliceWidth;
                }

                canvasCtx.lineTo(canvas.width, canvas.height / 2);
                canvasCtx.stroke();
            }

            draw();
        }

        function drawFlatline() {
            canvasCtx.fillStyle = '#0f172a';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            
            canvasCtx.lineWidth = 2;
            canvasCtx.strokeStyle = '#334155'; // slate-700
            canvasCtx.beginPath();
            canvasCtx.moveTo(0, canvas.height / 2);
            canvasCtx.lineTo(canvas.width, canvas.height / 2);
            canvasCtx.stroke();
        }
    </script>
</body>
</html>
