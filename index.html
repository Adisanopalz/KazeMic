<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KazeMic - Perekam Suara Interaktif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* Warna Tema Default (Cyan) */
            --theme-color: #06b6d4; 
            --theme-color-hover: #0891b2;
            --theme-color-transparent: rgba(6, 182, 212, 0.2);
        }

        /* Styling khusus untuk audio player dan scrollbar */
        audio {
            width: 100%;
            height: 40px;
            outline: none;
        }
        audio::-webkit-media-controls-panel {
            background-color: #1e293b; /* slate-800 */
        }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: #e2e8f0; /* slate-200 */
        }
        
        input[type="checkbox"] {
            accent-color: var(--theme-color);
        }
        
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
            background: transparent;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid #334155;
            border-radius: 50%;
        }

        /* Custom Scrollbar for History List */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--theme-color); }
        
        /* Smooth transitions */
        .theme-transition {
            transition: background-color 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-950 flex items-center justify-center p-4 font-sans text-slate-100 selection:bg-[var(--theme-color-transparent)] selection:text-[var(--theme-color)]">

    <div class="w-full max-w-md bg-slate-900 rounded-3xl shadow-[0_10px_40px_rgba(0,0,0,0.5)] overflow-hidden border border-slate-800 relative z-10">
        
        <!-- Header -->
        <div class="p-5 bg-slate-800/60 flex items-center justify-between border-b border-slate-800 backdrop-blur-md">
            <div class="flex items-center space-x-2">
                <!-- Wind Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--theme-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-transition" id="header-icon">
                    <path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"></path>
                    <path d="M9.6 4.6A2 2 0 1 1 11 8H2"></path>
                    <path d="M12.6 19.4A2 2 0 1 0 14 16H2"></path>
                </svg>
                <h1 class="text-xl font-bold text-white tracking-wide flex items-center gap-1">
                    Kaze<span class="text-[var(--theme-color)] theme-transition">Mic</span>
                </h1>
            </div>

            <div class="flex items-center space-x-3">
                <!-- Recording Indicator (Hidden by default) -->
                <div id="recording-indicator" class="hidden items-center space-x-2 bg-slate-900/50 px-2 py-1 rounded-full border border-slate-700/50">
                    <div id="indicator-dot" class="w-2 h-2 bg-red-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
                    <span id="indicator-text" class="text-xs font-semibold text-slate-300">REC</span>
                </div>
                <!-- Settings Toggle Button -->
                <button id="settings-toggle" class="p-2 bg-slate-800 hover:bg-slate-700 rounded-full text-slate-400 hover:text-white transition-all active:scale-95" title="Pengaturan">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Settings Panel (Collapsible) -->
        <div id="settings-panel" class="max-h-0 overflow-hidden transition-all duration-500 ease-in-out bg-slate-800/40 border-slate-700/50 border-b-0">
            <div class="p-5 space-y-4 border-b border-slate-700/50">
                <div class="flex items-center justify-between">
                    <span class="text-xs font-medium text-slate-400">Warna Tema</span>
                    <input type="color" id="theme-color-picker" value="#06b6d4" title="Pilih Warna Tema">
                </div>
                
                <div class="flex items-center justify-between">
                    <span class="text-xs font-medium text-slate-400">Gaya Visualizer</span>
                    <select id="visualizer-style" class="bg-slate-900 border border-slate-700 rounded-lg px-2 py-1 text-xs text-slate-200 focus:outline-none focus:border-[var(--theme-color)] cursor-pointer">
                        <option value="wave">Gelombang (Wave)</option>
                        <option value="bars">Balok (Bars)</option>
                    </select>
                </div>

                <div class="flex flex-col space-y-2">
                    <span class="text-xs font-medium text-slate-400">Pilih Mikrofon</span>
                    <select id="mic-select" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-[var(--theme-color)] truncate cursor-pointer">
                        <option value="">Default System Microphone</option>
                    </select>
                </div>

                <div class="flex flex-wrap gap-4 pt-2 border-t border-slate-700/50">
                    <label class="flex items-center space-x-2 cursor-pointer hover:text-white transition-colors text-xs text-slate-300">
                        <input type="checkbox" id="noise-suppression" checked class="w-3.5 h-3.5 rounded bg-slate-900 border-slate-700">
                        <span>Peredam Bising</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer hover:text-white transition-colors text-xs text-slate-300">
                        <input type="checkbox" id="echo-cancellation" checked class="w-3.5 h-3.5 rounded bg-slate-900 border-slate-700">
                        <span>Anti Gema</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="p-6 space-y-6">
            <!-- Error Message -->
            <div id="error-message" class="hidden bg-red-500/10 border border-red-500/50 text-red-400 p-3 rounded-xl flex items-start space-x-2 text-sm backdrop-blur-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0 mt-0.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" x2="12" y1="8" y2="12"></line><line x1="12" x2="12.01" y1="16" y2="16"></line></svg>
                <span id="error-text">Terjadi kesalahan.</span>
            </div>

            <!-- Visualizer Canvas -->
            <div class="relative w-full h-36 bg-slate-950 rounded-2xl overflow-hidden border border-slate-800 shadow-[inset_0_2px_10px_rgba(0,0,0,0.5)] group">
                <canvas id="visualizer" width="400" height="144" class="w-full h-full"></canvas>
                <!-- Timer Overlay -->
                <div id="timer-display" class="absolute top-3 right-3 text-sm font-mono font-bold text-slate-300 bg-slate-900/80 px-2.5 py-1 rounded-lg backdrop-blur-md border border-slate-700/50 shadow-lg transition-colors">
                    00:00
                </div>
                <!-- Status Text Overlay (Idle) -->
                <div id="status-overlay" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-50 transition-opacity group-hover:opacity-10">
                    <span class="text-xs font-medium tracking-[0.2em] text-slate-500 uppercase">Siap Merekam</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex flex-col items-center space-y-5">
                
                <!-- Main Action Container -->
                <div id="main-controls" class="w-full flex flex-col items-center">
                    
                    <!-- INITIAL RECORD BUTTON -->
                    <div id="start-section" class="flex flex-col items-center space-y-3 mt-2">
                        <div class="relative flex items-center justify-center group">
                            <!-- Ping Animation Background -->
                            <div class="absolute inset-0 rounded-full bg-[var(--theme-color)] opacity-20 group-hover:animate-ping theme-transition"></div>
                            
                            <button id="record-btn" class="relative z-10 w-20 h-20 rounded-full flex items-center justify-center transition-all duration-300 shadow-[0_0_20px_var(--theme-color-transparent)] bg-[var(--theme-color)] hover:bg-[var(--theme-color-hover)] hover:scale-105 active:scale-95 theme-transition">
                                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                    <line x1="12" x2="12" y1="19" y2="22"></line>
                                </svg>
                            </button>
                        </div>
                        <p id="helper-text" class="text-slate-400 text-sm font-medium animate-pulse">Ketuk untuk mulai merekam</p>
                    </div>

                    <!-- ACTIVE RECORDING CONTROLS (Hidden by default) -->
                    <div id="active-recording-controls" class="hidden flex items-center justify-center space-x-8 mt-2">
                        <!-- Pause/Resume Button -->
                        <div class="flex flex-col items-center space-y-2">
                            <button id="pause-btn" class="w-14 h-14 rounded-full flex items-center justify-center transition-all duration-300 shadow-lg bg-amber-500 hover:bg-amber-400 shadow-amber-500/20 text-slate-900 hover:scale-105 active:scale-95">
                                <svg id="icon-pause" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="block">
                                    <rect width="4" height="16" x="6" y="4" rx="1"></rect>
                                    <rect width="4" height="16" x="14" y="4" rx="1"></rect>
                                </svg>
                                <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden ml-1">
                                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                                </svg>
                            </button>
                            <span id="pause-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Jeda</span>
                        </div>

                        <!-- Stop Button -->
                        <div class="flex flex-col items-center space-y-2">
                            <button id="stop-btn" class="w-16 h-16 rounded-full flex items-center justify-center transition-all duration-300 shadow-lg bg-red-500 hover:bg-red-400 shadow-red-500/30 text-white hover:scale-105 active:scale-95">
                                <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect width="14" height="14" x="5" y="5" rx="2" ry="2"></rect>
                                </svg>
                            </button>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Selesai</span>
                        </div>
                    </div>

                    <!-- PLAYBACK & DOWNLOAD SECTION (Hidden by default) -->
                    <div id="playback-section" class="w-full space-y-5 hidden animate-[fadeIn_0.5s_ease-out]">
                        <div class="bg-slate-950 p-3 rounded-2xl border border-slate-800 shadow-inner">
                            <audio id="audio-player" controls class="w-full"></audio>
                        </div>
                        
                        <div class="space-y-1.5">
                            <label for="filename-input" class="text-xs font-semibold text-slate-400 pl-1">Simpan Sebagai:</label>
                            <div class="relative">
                                <input type="text" id="filename-input" value="Rekaman_KazeMic" class="w-full bg-slate-800/80 border border-slate-700 rounded-xl pl-4 pr-12 py-3 text-sm text-white focus:outline-none focus:border-[var(--theme-color)] focus:ring-1 focus:ring-[var(--theme-color)] transition-all placeholder-slate-600 shadow-inner theme-transition">
                                <span class="absolute right-4 top-3.5 text-xs font-medium text-slate-500 pointer-events-none">.webm</span>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="flex flex-col space-y-3">
                            <div class="flex space-x-3">
                                <button id="reset-btn" class="flex-1 flex items-center justify-center space-x-2 py-3 bg-slate-800 hover:bg-slate-700 rounded-xl text-sm font-medium transition-colors border border-slate-700 hover:border-slate-600">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                                        <path d="M3 3v5h5"></path>
                                    </svg>
                                    <span>Ulangi</span>
                                </button>
                                <a id="download-btn" href="#" download="Rekaman_KazeMic.webm" class="flex-1 flex items-center justify-center space-x-2 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl text-sm font-medium transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                        <polyline points="7 10 12 15 17 10"></polyline>
                                        <line x1="12" x2="12" y1="15" y2="3"></line>
                                    </svg>
                                    <span>Unduh</span>
                                </a>
                            </div>
                            
                            <!-- Save to Local DB Button -->
                            <button id="save-local-btn" class="w-full flex items-center justify-center space-x-2 py-3.5 bg-[var(--theme-color)] hover:bg-[var(--theme-color-hover)] text-white rounded-xl text-sm font-bold transition-all shadow-[0_4px_15px_var(--theme-color-transparent)] hover:shadow-[0_6px_20px_var(--theme-color-transparent)] hover:-translate-y-0.5 active:translate-y-0 theme-transition">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                                    <polyline points="17 21 17 13 7 13 7 21"></polyline>
                                    <polyline points="7 3 7 8 15 8"></polyline>
                                </svg>
                                <span>Simpan ke Riwayat Lokal</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- History Section -->
                <div id="history-section" class="w-full pt-5 border-t border-slate-800 mt-4">
                    <h3 class="text-sm font-semibold text-slate-300 mb-3 flex items-center justify-between">
                        <span class="flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-500"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                            Riwayat Lokal
                        </span>
                        <span id="history-count" class="text-[10px] font-bold bg-slate-800 border border-slate-700 px-2 py-0.5 rounded-full text-[var(--theme-color)] theme-transition">0</span>
                    </h3>
                    <div id="history-list" class="space-y-2.5 max-h-48 overflow-y-auto pr-1.5 custom-scrollbar">
                        <!-- History items will be injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State variables
        let isRecording = false;
        let isPaused = false;
        let recordingTime = 0;
        let audioUrl = null;
        let fileExtension = 'webm';
        let currentAudioBlob = null;
        let db = null;
        
        let mediaRecorder = null;
        let audioChunks = [];
        let audioContext = null;
        let analyser = null;
        let animationFrame = null;
        let stream = null;
        let timerInterval = null;
        
        let currentThemeColor = '#06b6d4';
        let idleOffset = 0; // For idle animation

        // DOM Elements
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        const rootStyles = document.documentElement;
        
        // Sections & Panels
        const startSection = document.getElementById('start-section');
        const activeRecordingControls = document.getElementById('active-recording-controls');
        const playbackSection = document.getElementById('playback-section');
        const settingsPanel = document.getElementById('settings-panel');
        
        // Buttons & Inputs
        const recordBtn = document.getElementById('record-btn');
        const stopBtn = document.getElementById('stop-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const resetBtn = document.getElementById('reset-btn');
        const downloadBtn = document.getElementById('download-btn');
        const saveLocalBtn = document.getElementById('save-local-btn');
        const settingsToggle = document.getElementById('settings-toggle');
        
        const filenameInput = document.getElementById('filename-input');
        const micSelect = document.getElementById('mic-select');
        const colorPicker = document.getElementById('theme-color-picker');
        const visStyleSelect = document.getElementById('visualizer-style');
        
        // Lists & Texts
        const historyList = document.getElementById('history-list');
        const historyCount = document.getElementById('history-count');
        const timerDisplay = document.getElementById('timer-display');
        const helperText = document.getElementById('helper-text');
        const statusOverlay = document.getElementById('status-overlay');
        
        // Icons & Indicators
        const iconPause = document.getElementById('icon-pause');
        const iconPlay = document.getElementById('icon-play');
        const pauseText = document.getElementById('pause-text');
        const recordingIndicator = document.getElementById('recording-indicator');
        const indicatorDot = document.getElementById('indicator-dot');
        const indicatorText = document.getElementById('indicator-text');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const audioPlayer = document.getElementById('audio-player');

        // Settings
        const optNoise = document.getElementById('noise-suppression');
        const optEcho = document.getElementById('echo-cancellation');

        // --- Init Theme & Animation ---
        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16),
                g = parseInt(hex.slice(3, 5), 16),
                b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function updateTheme(color) {
            currentThemeColor = color;
            rootStyles.style.setProperty('--theme-color', color);
            rootStyles.style.setProperty('--theme-color-transparent', hexToRgba(color, 0.2));
            localStorage.setItem('kazemic_theme', color);
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('kazemic_theme');
        if (savedTheme) {
            colorPicker.value = savedTheme;
            updateTheme(savedTheme);
        }

        colorPicker.addEventListener('input', (e) => updateTheme(e.target.value));

        // Start Canvas Animation Loop
        startDrawLoop();

        // --- Event Listeners ---
        recordBtn.addEventListener('click', startRecording);
        stopBtn.addEventListener('click', stopRecording);
        pauseBtn.addEventListener('click', togglePause);
        resetBtn.addEventListener('click', resetRecording);
        saveLocalBtn.addEventListener('click', saveToLocal);
        
        settingsToggle.addEventListener('click', () => {
            if (settingsPanel.classList.contains('max-h-0')) {
                settingsPanel.classList.replace('max-h-0', 'max-h-96');
                settingsPanel.classList.add('border-b');
                settingsToggle.classList.add('bg-slate-700', 'text-white');
            } else {
                settingsPanel.classList.replace('max-h-96', 'max-h-0');
                settingsPanel.classList.remove('border-b');
                settingsToggle.classList.remove('bg-slate-700', 'text-white');
            }
        });

        // Update download filename dynamically
        filenameInput.addEventListener('input', (e) => {
            let safeName = e.target.value.trim().replace(/[^a-z0-9_\- ]/gi, '_');
            if (!safeName) safeName = "Rekaman_Tanpa_Nama";
            downloadBtn.download = `${safeName}.${fileExtension}`;
        });

        // --- Core Functions ---
        
        // Initialize IndexedDB
        function initDB() {
            const request = indexedDB.open('KazeMicDB', 1);
            request.onupgradeneeded = (e) => {
                db = e.target.result;
                if (!db.objectStoreNames.contains('recordings')) {
                    db.createObjectStore('recordings', { keyPath: 'id' });
                }
            };
            request.onsuccess = (e) => {
                db = e.target.result;
                loadHistory();
            };
            request.onerror = (e) => console.error('IndexedDB error:', e);
        }
        initDB();

        // Load Microphones list
        async function loadMicrophones() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const audioInputs = devices.filter(device => device.kind === 'audioinput');
                
                micSelect.innerHTML = '';
                if (audioInputs.length === 0) {
                    micSelect.innerHTML = '<option value="">Mikrofon Default</option>';
                    return;
                }

                audioInputs.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Mikrofon ${index + 1}`;
                    micSelect.appendChild(option);
                });
            } catch (err) {
                console.log('Error enumerating devices:', err);
                micSelect.innerHTML = '<option value="">Mikrofon Default</option>';
            }
        }
        loadMicrophones();

        // Save to Local DB
        function saveToLocal() {
            if (!currentAudioBlob || !db) return;
            
            const recData = {
                id: Date.now(),
                name: filenameInput.value || 'Rekaman_Tanpa_Nama',
                blob: currentAudioBlob,
                duration: recordingTime,
                date: new Date().toLocaleString('id-ID')
            };
            
            const tx = db.transaction('recordings', 'readwrite');
            const store = tx.objectStore('recordings');
            store.add(recData);
            
            tx.oncomplete = () => {
                loadHistory();
                
                // Visual feedback (Success animation)
                const originalHTML = saveLocalBtn.innerHTML;
                saveLocalBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="animate-bounce"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    <span>Tersimpan!</span>
                `;
                saveLocalBtn.classList.replace('bg-[var(--theme-color)]', 'bg-emerald-500');
                saveLocalBtn.classList.replace('hover:bg-[var(--theme-color-hover)]', 'hover:bg-emerald-400');
                saveLocalBtn.classList.replace('shadow-[0_4px_15px_var(--theme-color-transparent)]', 'shadow-[0_4px_15px_rgba(16,185,129,0.3)]');
                
                setTimeout(() => {
                    saveLocalBtn.innerHTML = originalHTML;
                    saveLocalBtn.classList.replace('bg-emerald-500', 'bg-[var(--theme-color)]');
                    saveLocalBtn.classList.replace('hover:bg-emerald-400', 'hover:bg-[var(--theme-color-hover)]');
                    saveLocalBtn.classList.replace('shadow-[0_4px_15px_rgba(16,185,129,0.3)]', 'shadow-[0_4px_15px_var(--theme-color-transparent)]');
                }, 2000);
            };
        }

        // Load History from Local DB
        function loadHistory() {
            if (!db) return;
            const tx = db.transaction('recordings', 'readonly');
            const store = tx.objectStore('recordings');
            const request = store.getAll();
            
            request.onsuccess = () => {
                const recordings = request.result.sort((a, b) => b.id - a.id);
                historyCount.textContent = recordings.length;
                historyList.innerHTML = '';
                
                if(recordings.length === 0) {
                    historyList.innerHTML = '<p class="text-xs text-slate-500 text-center py-6 font-medium bg-slate-900/50 rounded-xl border border-slate-800/50">Belum ada rekaman tersimpan.</p>';
                    return;
                }

                recordings.forEach(rec => {
                    const item = document.createElement('div');
                    item.className = 'bg-slate-800/50 p-3 rounded-xl border border-slate-700/50 flex items-center justify-between group hover:bg-slate-800 hover:border-[var(--theme-color-transparent)] transition-all duration-300';
                    
                    const blobUrl = URL.createObjectURL(rec.blob);
                    
                    item.innerHTML = `
                        <div class="flex flex-col overflow-hidden mr-3">
                            <span class="text-sm font-bold text-slate-200 truncate group-hover:text-white transition-colors" title="${rec.name}">${rec.name}</span>
                            <span class="text-[10px] font-medium text-slate-500 mt-1 tracking-wide uppercase">${rec.date} • ${formatTime(rec.duration)}</span>
                        </div>
                        <div class="flex space-x-2 shrink-0 opacity-100 sm:opacity-70 sm:group-hover:opacity-100 transition-opacity">
                            <button onclick="playHistory('${blobUrl}', '${rec.name}')" class="w-8 h-8 rounded-lg bg-slate-700 hover:bg-[var(--theme-color)] hover:shadow-[0_0_10px_var(--theme-color-transparent)] flex items-center justify-center text-slate-300 hover:text-white transition-all theme-transition" title="Putar & Edit">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            </button>
                            <a href="${blobUrl}" download="${rec.name}.${fileExtension}" class="w-8 h-8 rounded-lg bg-slate-700 hover:bg-emerald-500 hover:shadow-[0_0_10px_rgba(16,185,129,0.3)] flex items-center justify-center text-slate-300 hover:text-white transition-all" title="Unduh Langsung">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" x2="12" y1="15" y2="3"></line></svg>
                            </a>
                            <button onclick="deleteHistory(${rec.id})" class="w-8 h-8 rounded-lg bg-slate-700 hover:bg-rose-500 hover:shadow-[0_0_10px_rgba(244,63,94,0.3)] flex items-center justify-center text-slate-300 hover:text-white transition-all" title="Hapus">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    `;
                    historyList.appendChild(item);
                });
            };
        }

        // Global functions for History Buttons
        window.playHistory = (url, name) => {
            audioPlayer.src = url;
            audioPlayer.play().catch(e => console.log("Auto-play prevented", e));
            filenameInput.value = name;
            downloadBtn.href = url;
            downloadBtn.download = `${name}.${fileExtension}`;
            
            playbackSection.classList.remove('hidden');
            startSection.classList.add('hidden');
            activeRecordingControls.classList.add('hidden');
            statusOverlay.classList.add('hidden');
            
            // Auto close settings panel if open
            if (!settingsPanel.classList.contains('max-h-0')) settingsToggle.click();
        };

        window.deleteHistory = (id) => {
            if(confirm("Anda yakin ingin menghapus rekaman ini dari riwayat?")) {
                const tx = db.transaction('recordings', 'readwrite');
                const store = tx.objectStore('recordings');
                store.delete(id);
                tx.oncomplete = () => loadHistory();
            }
        };

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorMessage.classList.remove('hidden');
        }

        function hideError() {
            errorMessage.classList.add('hidden');
        }

        function stopMediaTracks() {
            if (stream) stream.getTracks().forEach(track => track.stop());
        }

        async function startRecording() {
            hideError();
            audioChunks = [];
            isPaused = false;
            currentAudioBlob = null;
            statusOverlay.classList.add('hidden');

            try {
                const constraints = {
                    audio: {
                        noiseSuppression: optNoise.checked,
                        echoCancellation: optEcho.checked
                    }
                };

                if (micSelect.value) {
                    constraints.audio.deviceId = { exact: micSelect.value };
                }

                stream = await navigator.mediaDevices.getUserMedia(constraints);
                loadMicrophones(); // Refresh names if permissions just granted
                
                // Setup Audio Context untuk Visualizer
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioContext = new AudioContext();
                analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 2048;

                // Cek format codec
                let mimeType = 'audio/webm';
                if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
                    mimeType = 'audio/webm;codecs=opus';
                    fileExtension = 'webm';
                } else if (MediaRecorder.isTypeSupported('audio/mp4')) {
                    mimeType = 'audio/mp4';
                    fileExtension = 'mp4';
                } else if (MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')) {
                    mimeType = 'audio/ogg;codecs=opus';
                    fileExtension = 'ogg';
                }

                mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    currentAudioBlob = new Blob(audioChunks, { type: mimeType });
                    audioUrl = URL.createObjectURL(currentAudioBlob);
                    
                    audioPlayer.src = audioUrl;
                    
                    const defaultName = `KazeMic_${new Date().getFullYear()}${(new Date().getMonth()+1).toString().padStart(2,'0')}${new Date().getDate()}_${new Date().getHours()}${new Date().getMinutes()}`;
                    filenameInput.value = defaultName;
                    downloadBtn.href = audioUrl;
                    downloadBtn.download = `${defaultName}.${fileExtension}`;
                    
                    // Update UI ke mode Playback
                    activeRecordingControls.classList.add('hidden');
                    playbackSection.classList.remove('hidden');

                    stopMediaTracks();
                };

                mediaRecorder.start(200); 
                isRecording = true;

                // Update UI Navigation
                startSection.classList.add('hidden');
                activeRecordingControls.classList.remove('hidden');
                
                // Indicators
                recordingIndicator.classList.remove('hidden');
                recordingIndicator.classList.add('flex');
                indicatorDot.classList.replace('bg-amber-500', 'bg-red-500');
                indicatorDot.classList.add('animate-pulse', 'shadow-[0_0_8px_rgba(239,68,68,0.8)]');
                indicatorText.textContent = "REC";
                indicatorText.classList.replace('text-amber-400', 'text-red-400');
                
                timerDisplay.classList.add('text-[var(--theme-color)]');

                recordingTime = 0;
                timerDisplay.textContent = formatTime(recordingTime);
                startTimer();
                
                // Tutup settings panel saat rekam mulai
                if (!settingsPanel.classList.contains('max-h-0')) settingsToggle.click();

            } catch (err) {
                console.error("Gagal akses mikrofon:", err);
                showError("Gagal mengakses mikrofon. Pastikan izin audio diberikan.");
                statusOverlay.classList.remove('hidden');
            }
        }

        function togglePause() {
            if (!mediaRecorder || !isRecording) return;

            if (isPaused) {
                mediaRecorder.resume();
                isPaused = false;
                startTimer();
                
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
                pauseBtn.classList.replace('bg-emerald-500', 'bg-amber-500');
                pauseBtn.classList.replace('hover:bg-emerald-400', 'hover:bg-amber-400');
                pauseBtn.classList.replace('shadow-emerald-500/30', 'shadow-amber-500/20');
                pauseText.textContent = "Jeda";
                
                indicatorDot.classList.replace('bg-amber-500', 'bg-red-500');
                indicatorDot.classList.add('animate-pulse', 'shadow-[0_0_8px_rgba(239,68,68,0.8)]');
                indicatorText.textContent = "REC";
                indicatorText.classList.replace('text-amber-400', 'text-red-400');
                timerDisplay.classList.add('text-[var(--theme-color)]');

            } else {
                mediaRecorder.pause();
                isPaused = true;
                clearInterval(timerInterval);
                
                iconPause.classList.add('hidden');
                iconPlay.classList.remove('hidden');
                pauseBtn.classList.replace('bg-amber-500', 'bg-emerald-500');
                pauseBtn.classList.replace('hover:bg-amber-400', 'hover:bg-emerald-400');
                pauseBtn.classList.replace('shadow-amber-500/20', 'shadow-emerald-500/30');
                pauseText.textContent = "Lanjut";

                indicatorDot.classList.replace('bg-red-500', 'bg-amber-500');
                indicatorDot.classList.remove('animate-pulse', 'shadow-[0_0_8px_rgba(239,68,68,0.8)]');
                indicatorText.textContent = "PAUSED";
                indicatorText.classList.replace('text-red-400', 'text-amber-400');
                timerDisplay.classList.remove('text-[var(--theme-color)]');
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                isPaused = false;
                clearInterval(timerInterval);
                
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
                pauseBtn.className = "w-14 h-14 rounded-full flex items-center justify-center transition-all duration-300 shadow-lg bg-amber-500 hover:bg-amber-400 shadow-amber-500/20 text-slate-900 hover:scale-105 active:scale-95";
                pauseText.textContent = "Jeda";

                recordingIndicator.classList.add('hidden');
                recordingIndicator.classList.remove('flex');
                timerDisplay.classList.remove('text-[var(--theme-color)]');
            }
        }

        function resetRecording() {
            audioUrl = null;
            recordingTime = 0;
            timerDisplay.textContent = formatTime(recordingTime);
            hideError();
            
            playbackSection.classList.add('hidden');
            startSection.classList.remove('hidden');
            statusOverlay.classList.remove('hidden');
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                recordingTime++;
                timerDisplay.textContent = formatTime(recordingTime);
            }, 1000);
        }

        // Unified Draw Loop handles Idle, Wave, and Bars
        function startDrawLoop() {
            const bufferLength = analyser ? analyser.frequencyBinCount : 0;
            let dataArray = null;
            if (analyser) dataArray = new Uint8Array(bufferLength);

            function draw() {
                animationFrame = requestAnimationFrame(draw);

                canvasCtx.fillStyle = '#020617'; // slate-950
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                // Idle Animation (When not recording and not playing back)
                if (!isRecording && !audioUrl) {
                    canvasCtx.lineWidth = 2;
                    canvasCtx.strokeStyle = '#1e293b'; // slate-800
                    canvasCtx.shadowBlur = 0;
                    canvasCtx.beginPath();
                    let y = canvas.height / 2;
                    for (let x = 0; x < canvas.width; x++) {
                        // Smooth sine wave
                        canvasCtx.lineTo(x, y + Math.sin(x * 0.02 + idleOffset) * 15);
                    }
                    canvasCtx.stroke();
                    idleOffset += 0.04;
                    return;
                }

                if (!analyser || !dataArray) {
                    if(audioContext && stream) {
                        dataArray = new Uint8Array(analyser.frequencyBinCount);
                    } else return;
                }

                const style = visStyleSelect.value;
                canvasCtx.shadowColor = isPaused ? 'transparent' : currentThemeColor;
                canvasCtx.shadowBlur = isPaused ? 0 : 12;

                if (style === 'wave') {
                    analyser.getByteTimeDomainData(dataArray);
                    canvasCtx.lineWidth = isPaused ? 1.5 : 3;
                    canvasCtx.strokeStyle = isPaused ? '#64748b' : currentThemeColor;
                    canvasCtx.beginPath();

                    const sliceWidth = canvas.width * 1.0 / analyser.frequencyBinCount;
                    let x = 0;

                    for (let i = 0; i < analyser.frequencyBinCount; i++) {
                        let v = dataArray[i] / 128.0;
                        if (isPaused) v = 1 + (v - 1) * 0.15; // Flatten if paused
                        const y = v * canvas.height / 2;

                        if (i === 0) canvasCtx.moveTo(x, y);
                        else canvasCtx.lineTo(x, y);
                        x += sliceWidth;
                    }
                    canvasCtx.lineTo(canvas.width, canvas.height / 2);
                    canvasCtx.stroke();
                } else {
                    // Bars Style
                    analyser.getByteFrequencyData(dataArray);
                    const barWidth = (canvas.width / analyser.frequencyBinCount) * 3;
                    let barHeight;
                    let x = 0;
                    
                    canvasCtx.fillStyle = isPaused ? '#64748b' : currentThemeColor;
                    
                    // Draw mirror bars from center
                    const midY = canvas.height / 2;
                    
                    for (let i = 0; i < analyser.frequencyBinCount; i++) {
                        barHeight = dataArray[i] / 2;
                        if (isPaused) barHeight = barHeight * 0.2;
                        
                        // Top half
                        canvasCtx.fillRect(x, midY - barHeight, barWidth - 1, barHeight);
                        // Bottom half (reflection)
                        canvasCtx.fillRect(x, midY, barWidth - 1, barHeight);
                        
                        x += barWidth;
                    }
                }
            }
            draw();
        }

    </script>
